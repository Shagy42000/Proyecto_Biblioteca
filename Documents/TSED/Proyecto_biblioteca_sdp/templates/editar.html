{% extends 'base.html' %}

{% block titulo %}Editar Libro{% endblock %}

{% block contenido %}
<div class="form-card">
    <h2>Editar Libro</h2>
    <form method="POST" class="form-vertical">
        <label>Título</label>
        <input type="text" name="titulo" value="{{ libro.titulo }}" required>
        <label>Autor</label>
        <input type="text" name="autor" value="{{ libro.autor }}" required>
        <label>Cantidad</label>
        <input type="number" name="cantidad" value="{{ libro.cantidad }}" min="1" required>
        <button type="submit" class="btn-primary">Actualizar</button>
        <a href="/libros" class="btn-cancel">Cancelar</a>
    </form>
</div>
{% endblock %}
